services:
  - type: web
    name: registrar-bot
    env: python
    buildCommand: python3 -m pip install -r requirements-runtime.txt
    startCommand: python3 bot.py
    disk:
      name: bot_data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.12
      - key: DB_FILE
        value: /data/attendance.db
      - key: DISCORD_TOKEN
        sync: false
